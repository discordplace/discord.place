name: Lint

on:
  pull_request:
    paths:
      - 'client/**'
  push:
    branches: [main]

permissions: {}

jobs:
  oxlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: latest

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm

      - run: cd client && pnpm install --frozen-lockfile --ignore-scripts
      - run: cd client && pnpm run lint:github