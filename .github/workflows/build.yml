name: 'Build and Deploy'

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'What to build/deploy'
        required: true
        type: choice
        options:
          - client
          - server

jobs:
  build-and-deploy-client:
    name: Build and Deploy /client
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'client')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: tsickert/discord-webhook@v7.0.0
        with:
          webhook-url: ${{ secrets.BUILD_WEBHOOK_URL }}
          embed-title: 'Deployment Notification'
          embed-description: 'Deployment triggered. Proceeding with build and restart.'
          embed-footer-text: 'discord.place'
          embed-color: 14194756

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml

      - name: Install dependencies
        run: cd client && pnpm install --frozen-lockfile --dangerously-allow-all-builds

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: client/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('client/pnpm-lock.yaml') }}-${{ hashFiles('client/**/*.{js,jsx,ts,tsx}') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('client/pnpm-lock.yaml') }}-
            ${{ runner.os }}-nextjs-

      - name: Build Next.js app
        run: cd client && pnpm run build

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Generate deployment path
        id: set_path
        run: |
          ID=$(uuidgen)
          REMOTE_PATH="/root/builds/$ID"
          echo "DEPLOY_PATH=$REMOTE_PATH" >> $GITHUB_ENV
          echo "remote_target=$REMOTE_PATH" >> $GITHUB_OUTPUT
          echo "deployment_id=$ID" >> $GITHUB_OUTPUT
          ssh -T -i ~/.ssh/id_rsa -o StrictHostKeyChecking=accept-new -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" "mkdir -p $REMOTE_PATH"

      - name: Copy build artifacts and package files to server
        uses: burnett01/rsync-deployments@v8
        with:
          switches: -avz
          path: client/.next client/package.json client/pnpm-lock.yaml
          remote_path: ${{ steps.set_path.outputs.remote_target }}
          remote_host: ${{ secrets.SSH_HOST }}
          remote_port: ${{ secrets.SSH_PORT }}
          remote_user: ${{ secrets.SSH_USER }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Update symlinks, restart, and healthcheck
        env:
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          CLIENT_PORT: ${{ secrets.CLIENT_PORT }}
        run: |
          ssh -T -i ~/.ssh/id_rsa -o StrictHostKeyChecking=accept-new -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" << 'EOF'
            set -e
            
            DEPLOY_ID="${{ steps.set_path.outputs.deployment_id }}"
            LOG_FILE="/tmp/build-workflow-$DEPLOY_ID.log"
            touch "$LOG_FILE"
            exec > "$LOG_FILE" 2>&1

            echo "Starting deployment at $(date)"
            
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            nvm use $(nvm current)

            REMOTE_PATH="/root/builds/$DEPLOY_ID"
            WRAPPER_PATH="/root/apps/discord.place/client"

            OLD_NEXT_TARGET=$(readlink "$WRAPPER_PATH/.next" || echo "")
            if [ -n "$OLD_NEXT_TARGET" ]; then
              OLD_BUILD_DIR=$(dirname "$OLD_NEXT_TARGET")
            else
              OLD_BUILD_DIR=""
            fi

            echo "Updating symlinks for .next, package.json, and pnpm-lock.yaml..."
            rm -rf "$WRAPPER_PATH/.next" "$WRAPPER_PATH/package.json" "$WRAPPER_PATH/pnpm-lock.yaml"
            
            ln -s "$REMOTE_PATH/.next" "$WRAPPER_PATH/.next"
            ln -s "$REMOTE_PATH/package.json" "$WRAPPER_PATH/package.json"
            ln -s "$REMOTE_PATH/pnpm-lock.yaml" "$WRAPPER_PATH/pnpm-lock.yaml"

            echo "Installing dependencies..."
            cd "$WRAPPER_PATH"
            pnpm install --frozen-lockfile

            echo "Restarting application..."
            pm2 restart discord.place

            echo "Waiting for app to boot before health check..."
            HEALTH_URL="http://localhost:${{env.CLIENT_PORT}}/api/health"
            MAX_RETRIES=15
            RETRY_COUNT=0
            HEALTHY=false

            while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
              sleep 4
              STATUS_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL" || echo "000")
              if [ "$STATUS_CODE" -eq 200 ]; then
                HEALTHY=true
                echo "Client health check passed"
                break
              fi
              RETRY_COUNT=$((RETRY_COUNT+1))
              echo "Health check failed (Status: $STATUS_CODE). Retrying... ($RETRY_COUNT/$MAX_RETRIES)"
            done

            if [ "$HEALTHY" = false ]; then
              echo "Application failed health check. Initiating rollback..."
              
              if [ -n "$OLD_BUILD_DIR" ] && [ -d "$OLD_BUILD_DIR" ]; then
                echo "Reverting symlinks back to: $OLD_BUILD_DIR"
                rm -rf "$WRAPPER_PATH/.next" "$WRAPPER_PATH/package.json" "$WRAPPER_PATH/pnpm-lock.yaml"
                
                ln -s "$OLD_BUILD_DIR/.next" "$WRAPPER_PATH/.next"
                ln -s "$OLD_BUILD_DIR/package.json" "$WRAPPER_PATH/package.json"
                ln -s "$OLD_BUILD_DIR/pnpm-lock.yaml" "$WRAPPER_PATH/pnpm-lock.yaml"
                
                echo "Reverting node_modules state..."
                pnpm install --frozen-lockfile
                
                pm2 restart discord.place
                echo "Rollback completed. Failing workflow step."
              else
                echo "No valid previous build found. Cannot perform rollback."
              fi
              exit 1
            fi

            echo "Cleaning up old builds..."
            find /root/builds/ -mindepth 1 -maxdepth 1 -type d -mtime +7 -exec rm -rf {} +

            echo "Deployment completed successfully at $(date)"
          EOF

      - uses: chimpdev/bark-github-action@v1.0.1
        with:
            device_key: ${{ secrets.BARK_KEY }}
            server_url: ${{ secrets.BARK_SERVER_URL }}
            title: '${{ github.repository }}'
            body: 'Client Build and Deploy triggered and completed. Job is ${{ job.status }}.'
            url: '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
            icon: 'https://i.ibb.co/7d8rL1c3/Git-Hub-Mark-ea2971cee799.jpg'
        if: always()

  build-and-deploy-server:
    name: Build and Deploy /server
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'server')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: tsickert/discord-webhook@v7.0.0
        with:
          webhook-url: ${{ secrets.BUILD_WEBHOOK_URL }}
          embed-title: 'Deployment Notification'
          embed-description: 'Deployment triggered. Proceeding with restart.'
          embed-footer-text: 'api.discord.place'
          embed-color: 14194756

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Build, deploy, and healthcheck server
        env:
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
        run: |
          ssh -T -i ~/.ssh/id_rsa -o StrictHostKeyChecking=accept-new -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" << 'EOF'
            set -e
            
            LOG_FILE="/tmp/server-build-workflow-$(date +%s).log"
            touch "$LOG_FILE"
            exec > "$LOG_FILE" 2>&1

            echo "Starting server deployment at $(date)"

            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            nvm use $(nvm current)

            cd apps/discord.place/server

            PREV_COMMIT=$(git rev-parse HEAD)

            echo "Pulling latest code from GitHub..."
            git pull origin main

            echo "Installing dependencies..."
            pnpm install --frozen-lockfile

            echo "Restarting application..."
            pm2 restart api.discord.place

            echo "Waiting for server to boot before health check..."
            HEALTH_URL="http://localhost:${{env.SERVER_PORT}}/health"
            MAX_RETRIES=5
            RETRY_COUNT=0
            HEALTHY=false

            while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
              sleep 4
              STATUS_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL" || echo "000")
              if [ "$STATUS_CODE" -eq 200 ]; then
                HEALTHY=true
                echo "Server health check passed!"
                break
              fi
              RETRY_COUNT=$((RETRY_COUNT+1))
              echo "Health check failed (Status: $STATUS_CODE). Retrying... ($RETRY_COUNT/$MAX_RETRIES)"
            done

            if [ "$HEALTHY" = false ]; then
              echo "Server failed health check. Initiating rollback..."
              echo "Reverting to commit: $PREV_COMMIT"
              git reset --hard "$PREV_COMMIT"
              pnpm install --frozen-lockfile
              pm2 restart api.discord.place
              echo "Rollback completed. Failing workflow step."
              exit 1
            fi

            echo "Deployment completed successfully at $(date)"
          EOF

      - uses: chimpdev/bark-github-action@v1.0.1
        with:
            device_key: ${{ secrets.BARK_KEY }}
            server_url: ${{ secrets.BARK_SERVER_URL }}
            title: '${{ github.repository }}'
            body: 'Server Build and Deploy triggered and completed. Job is ${{ job.status }}.'
            url: '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
            icon: 'https://i.ibb.co/7d8rL1c3/Git-Hub-Mark-ea2971cee799.jpg'
        if: always()